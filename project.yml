name: Zaluzky
options:
  bundleIdPrefix: com.punkhive
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "26.0"
packages:
  OverkizKit:
    path: Packages/OverkizKit
settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: GB4KCN39XD
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "5"
targets:
  Zaluzky:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: iOS
    dependencies:
      - target: ZaluzkyWatch
        embed: true
        codeSign: true
      - package: OverkizKit
    settings:
      base:
        PRODUCT_NAME: Zaluzky
        PRODUCT_BUNDLE_IDENTIFIER: com.punkhive.zaluzky
        SKIP_INSTALL: NO
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Žaluzky"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  ZaluzkyWatch:
    type: application
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: App
    dependencies:
      - package: OverkizKit
      - target: ZaluzkyWidgets
        embed: true
        codeSign: true
    settings:
      base:
        PRODUCT_NAME: ZaluzkyWatch
        PRODUCT_BUNDLE_IDENTIFIER: com.punkhive.zaluzky.watchkitapp
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Žaluzky"
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_WKCompanionAppBundleIdentifier: com.punkhive.zaluzky
        INFOPLIST_KEY_WKRunsIndependentlyOfCompanionApp: YES
        INFOPLIST_KEY_WKSupportedInterfaceOrientations: WKInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
  ZaluzkyWidgets:
    type: app-extension
    platform: watchOS
    deploymentTarget: "10.0"
    sources:
      - path: WidgetExtension
    settings:
      base:
        PRODUCT_NAME: ZaluzkyWidgets
        PRODUCT_BUNDLE_IDENTIFIER: com.punkhive.zaluzky.watchkitapp.widgets
        SKIP_INSTALL: YES
        TARGETED_DEVICE_FAMILY: "4"
        ENABLE_PREVIEWS: YES
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: WidgetExtension/Info.plist
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
schemes:
  Zaluzky:
    build:
      targets:
        Zaluzky: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
  ZaluzkyWatch:
    build:
      targets:
        ZaluzkyWatch: all
    run:
      config: Debug
    archive:
      config: Release
